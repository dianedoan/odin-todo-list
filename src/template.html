<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>todo</h1>
        </header>
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>PROJECTS</h2>
                <button class="create-project-btn" command="show-modal" commandfor="create-project-dialog">Create Project</button>
                <dialog id="create-project-dialog">
                    <button id="close-btn" commandfor="create-project-dialog" command="close">×</button>
                    <h4>Create Project</h4>
                    <form id="create-project-form" action="">
        
                    </form>
                </dialog>
            </div>
            <div class="project-list">
                <div class="inbox-item">
                    <h4>Inbox</h4>
                </div>
            </div>
        </div>
        <div class="main-content"></div>
    </div>
</body>
</html>
